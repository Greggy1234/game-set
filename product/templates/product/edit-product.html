{% extends "base.html" %}
{% load static %}

{% block extra_title %}Edit {{ product.name }}{% endblock %}

{% block content %}
<div class="container pt-4">
    <div class="row text-center">
        <div class="col-12">
            <h1><strong>GAME</strong> <i>SET</i> MANAGE</h1>
        </div>
        <div class="col-12">
            <h2>Edit {{ product.name }}</h2>
        </div>
    </div>
</div>
<div class="container">
    <div class="row">
        <div class="col-12 col-md-8 col-lg-6 justify-content-center offset-md-2 offset-lg-3">
            <form action="{% url 'edit_product' sku=product.sku %}" method="POST">
                {% csrf_token %}
                {{ form | crispy }}
            </form>
        </div>
    </div>
</div>
{% endblock %}
